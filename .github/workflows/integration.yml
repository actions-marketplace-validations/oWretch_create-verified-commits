name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      test-repo:
        description: 'Repository to run integration tests against (owner/repo)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  integration:
    name: Live API integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build action
        run: npm run build

      # Integration tests require a dedicated test repository.
      # Configure INTEGRATION_TEST_TOKEN (GitHub App installation token or PAT with
      # contents:write on the test repo) and INTEGRATION_TEST_REPO (owner/repo) as
      # repository secrets or provide them via workflow_dispatch inputs.
      #
      # The integration test suite verifies:
      # - Commits show as "Verified" in GitHub UI
      # - GITHUB_TOKEN vs App token behavior
      # - Tag conflict (409) handling
      # - Binary file round-trip
      # - Protected branch failure modes
      - name: Run integration tests
        env:
          INTEGRATION_TOKEN: ${{ secrets.INTEGRATION_TEST_TOKEN }}
          INTEGRATION_REPO: ${{ inputs.test-repo || vars.INTEGRATION_TEST_REPO }}
        run: |
          echo "Integration test suite not yet implemented."
          echo "Configure INTEGRATION_TEST_TOKEN and INTEGRATION_TEST_REPO to run live tests."
          echo "See README.md for setup instructions."
