name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: workflow
    attributes:
      label: Relevant workflow snippet
      description: The step(s) using this action, with sensitive values replaced.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant error messages or step output.
      render: text

  - type: input
    id: version
    attributes:
      label: Action version
      description: e.g. `v1.0.0`
    validations:
      required: true

  - type: input
    id: runner
    attributes:
      label: Runner OS
      description: e.g. `ubuntu-latest`, `macos-14`, `windows-latest`
    validations:
      required: true
